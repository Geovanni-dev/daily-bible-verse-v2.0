<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luz do Senhor - Versículos</title>
<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Luz Diária" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="manifest" href="site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="particles-js"></div>

    <nav class="navbar">
        <div class="nav-content">
            <!-- Agrupado a esquerda para não espremer -->
            <div class="nav-left">
                <div class="brand">
                    <div class="logo-icon"><i data-lucide="book-open"></i></div>
                    <span class="brand-text">Luz Diária</span>
                </div>
                <!-- Botão de Tema logo após o nome -->
                <button class="theme-toggle" onclick="toggleTheme()" title="Trocar Tema">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
            </div>

            <!-- Abas - Escondidas no mobile, formam o menu-->
            <div class="nav-tabs" id="nav-tabs">
                <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">
                    <i data-lucide="home" style="width: 18px;"></i> Início
                </button>
                <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
                    <i data-lucide="history" style="width: 18px;"></i> Histórico
                </button>
                <button class="tab-btn" data-tab="saved" onclick="switchTab('saved')">
                    <i data-lucide="heart" style="width: 18px;"></i> Salvos
                </button>
            </div>

            <!-- Botão Hambúrguer - Apenas Mobile -->
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i data-lucide="menu" id="mobile-menu-icon"></i>
            </button>
        </div>
    </nav>

    <!-- ABA INÍCIO -->
    <main class="main-content view-section active" id="view-home">
        <div class="verse-area">
            <div class="card-header">
                <i data-lucide="calendar-heart"></i> <span>Palavra de Hoje</span>
            </div>

            <!-- Estado Vazio -->
            <div id="empty-state" class="empty-state">
                <div class="empty-icon-wrap"><i data-lucide="book-open" style="width: 40px; height: 40px;"></i></div>
                <h3 id="status-title">Seu versículo está pronto</h3>
                <p id="status-desc">Descubra a palavra do nosso Senhor que foi separada para você neste dia.</p>
                <button id="generate-btn" class="generate-btn" onclick="gerarVersiculo()">
                    <span id="btn-text">Ler Versículo de Hoje</span>
                </button>
            </div>

            <!-- Versículo Exibido -->
            <div id="message-container" class="message-container">
                <blockquote id="message-text" class="verse-text"></blockquote>
                <div class="verse-footer">
                    <span id="message-ref" class="verse-ref"></span>
                    <div class="action-buttons">
                        <button class="icon-btn" id="main-like-btn" onclick="toggleLikeCurrent()" title="Salvar"><i data-lucide="heart"></i></button>
                        <button class="icon-btn" onclick="shareVerse(currentVerseData)" title="Compartilhar"><i data-lucide="share-2"></i></button>
                    </div>
                </div>
                <!-- Mensagem Volte Amanhã -->
                <div id="cooldown-container" class="cooldown-container">
                    <p class="cooldown-msg">Volte amanhã para mais um versículo!</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ABA HISTÓRICO (AGORA UMA PÁGINA DEDICADA) -->
    <main class="main-content view-section" id="view-history">
        <div>
            <div class="history-header">
                <h3><i data-lucide="history"></i> Histórico de Leituras</h3>
            </div>
            <div id="historico-list" class="history-list"></div>
        </div>
    </main>

    <!-- ABA SALVOS -->
    <main class="main-content view-section" id="view-saved">
        <div>
            <div class="history-header">
                <h3><i data-lucide="heart-handshake" class="section-heart-icon"></i> Meus Versículos Salvos</h3>
            </div>
            <div id="saved-list" class="history-list"></div>
        </div>
    </main>
    <!-- Rodapé -->

        </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script> <!-- Biblioteca para partículas de fundo -->
    <script src="script.js"></script> <!-- Script principal do aplicativo -->
</body>
</html>
